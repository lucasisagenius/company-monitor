name: Company Monitor Agent

on:
  schedule:
    # Run at 8am, 2pm, 8pm UTC (adjust times as needed)
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file with secrets
        run: |
          cat > .env << EOF
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_SMTP_HOST=smtp.gmail.com
          MAIL_SMTP_PORT=587
          EOF

      - name: Run monitoring agent
        run: python scheduler.py --run-once

      - name: Commit database changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f monitor.db ]; then
            git add monitor.db
            git commit -m "Update monitor database" || true
            git push || true
          else
            echo "Database not yet created"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: echo "⚠️ Monitor job failed. Check GitHub Actions for details."
